# Barycal room relay — a SEPARATE Cloudflare Worker, deployed independently of the
# Barycal Next site (the OpenNext worker `barycal`). Distinct from plur.nyc's
# `mayfly-room` relay so the two projects share no live infrastructure. This
# relay only ever handles ciphertext + routing metadata.
#
# Deploy (from this directory):
#   npm install
#   npx wrangler login
#   npm run deploy        # -> `wrangler deploy -c ./wrangler.toml`
#
# Use `npm run deploy` (NOT bare `npx wrangler deploy`): wrangler's config
# discovery walks UP the tree and would otherwise pick the repo-root
# wrangler.jsonc (the Next/OpenNext worker). The npm scripts pin `-c
# ./wrangler.toml`. `wrangler deploy` prints the *.workers.dev URL — put it in
# the Next app's NEXT_PUBLIC_ROOM_API_BASE env. Later attach room.<orbit-domain>
# as a custom domain.

name = "barycal-room"
main = "src/worker.js"
# Initial production deploy: 2026-06-23 (account worker/cron caps cleared; retry).
# Pin the account so CI deploys land on the same account as the main site
# (matches account_id in the repo-root wrangler.jsonc). The GH secret
# CLOUDFLARE_ACCOUNT_ID points at a different account, so we don't rely on it.
account_id = "1fb5ac4e609c1d4f4b9171e62d5127c1"
# SQLite-in-DO is GA well before this date; bump freely when adopting newer
# runtime behavior.
compatibility_date = "2025-06-01"

# room-do.js imports the shared frame schema from ../../../lib/mayfly/shared/
# protocol.js, which does `import { z } from 'zod'`. esbuild resolves that bare
# import from the shared file's location (repo root), but only workers/room has
# its deps installed in the deploy-room job — the repo-root node_modules isn't
# there. Pin zod to this package's own copy so the bundle resolves. zod IS a
# direct dependency here (see package.json), so ./node_modules/zod exists after
# `npm ci`.
[alias]
zod = "./node_modules/zod"

# Page origins allowed to open WebSocket upgrades / hit /health with CORS.
# Comma-separated. Read at request time in src/worker.js. Add Orbit's PAGE
# origin (the app's workers.dev host, or its custom domain once attached) — not
# this relay's host. localhost:3000 covers `next dev`.
[vars]
ALLOWED_ORIGINS = "https://barycal.junting-mp3.workers.dev,http://localhost:3000"

# ROOM_RELAY_SECRET is a SECRET, not a var — never put its value here. Set it via:
#   wrangler secret put ROOM_RELAY_SECRET -c ./wrangler.toml
# It must be the SAME value as on the app worker (the one that mints tokens). When
# unset, the admission gate is inactive and the relay behaves exactly as before
# (rollout-safe: deploy code first, then flip the secret on both workers).

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[observability]
enabled = true
