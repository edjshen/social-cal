# Daily backstop GC for orphaned per-PR preview Workers.
#
# preview.yml creates `barycal-pr-<N>` per open PR; preview-cleanup.yml deletes
# it on PR close. That cleanup is event-driven — if a close run is skipped/fails,
# the preview is orphaned. This scheduled sweep deletes any `barycal-pr-<N>`
# whose PR is no longer open. It runs on GitHub's scheduler, so it consumes NO
# Cloudflare cron trigger. Logic + safety invariants live in
# .github/scripts/preview-gc.sh (anchored match never touches prod `barycal` or
# the `barycal-room` relay).
name: Preview GC

on:
  schedule:
    - cron: '20 6 * * *' # daily ~06:20 UTC (off the top-of-hour GHA stampede)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List what would be deleted without deleting'
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: preview-gc
  cancel-in-progress: false

jobs:
  sweep:
    name: Sweep orphaned preview Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Sweep
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_API_KEY }}
          # Account IDs are not secrets (visible in any workers.dev URL).
          CF_ACCOUNT_ID: '1fb5ac4e609c1d4f4b9171e62d5127c1'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # schedule => real deletes; manual dispatch => honour dry_run (default true).
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: bash .github/scripts/preview-gc.sh
