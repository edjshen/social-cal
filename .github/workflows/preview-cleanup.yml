# Tear down a PR's Cloudflare preview Worker when the PR closes (merged or not).
# preview.yml deploys `barycal-pr-<N>` per PR; this deletes it on close so they
# don't pile up. The daily preview-gc.yml is the backstop if this run is
# skipped/fails.
name: Preview cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  delete-preview-worker:
    name: Delete preview Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete barycal-pr-<N>
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_API_KEY }}
          # Account IDs are not secrets (visible in any workers.dev URL).
          # Hardcoded to match wrangler.jsonc.
          CF_ACCOUNT_ID: '1fb5ac4e609c1d4f4b9171e62d5127c1'
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping preview cleanup."
            exit 0
          fi
          name="barycal-pr-${PR}"
          echo "Deleting preview Worker ${name}…"
          code=$(curl -sS -o /tmp/del.json -w "%{http_code}" --max-time 30 -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${name}?force=true" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" || echo "000")
          echo "HTTP ${code}"; cat /tmp/del.json 2>/dev/null || true; echo
          if [ "$code" = "200" ] || [ "$code" = "404" ]; then
            echo "Preview Worker cleanup OK (${code})."; exit 0
          fi
          echo "::error::Failed to delete ${name} (HTTP ${code})."; exit 1
